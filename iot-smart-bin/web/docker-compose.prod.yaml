# Dokploy Docker Compose file for production deployment
services:
  web:
    image: ghcr.io/nathangrenier/soen-422:latest
    container_name: iot-smart-bin-web
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    volumes:
      - ../files/db:/app/db
    networks:
      - dokploy-network
    expose:
      - "3010"

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - ../files/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../files/mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - ../files/mosquitto/data:/mosquitto/data
      - ../files/mosquitto/log:/mosquitto/log
    networks:
      - dokploy-network
    expose:
      - "9001"
    ports:
      - "1883:1883"

networks:
  dokploy-network:
    external: true
